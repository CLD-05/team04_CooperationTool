<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>팀 생성 완료</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 460px;
            background: white;
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            color: #243b53;
            margin-bottom: 24px;
        }

        .success {
            text-align: center;
            background-color: #e8f8ef;
            color: #1f9d55;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-weight: bold;
        }

        .item {
            margin-bottom: 16px;
        }

        .label {
            font-weight: bold;
            color: #334e68;
            margin-bottom: 6px;
            display: block;
        }

        .value {
            background: #f8fafc;
            border: 1px solid #d9e2ec;
            border-radius: 10px;
            padding: 12px;
        }

        .btn {
            display: block;
            margin-top: 24px;
            text-align: center;
            text-decoration: none;
            background: #3b97d3;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background: #2f86bf;
        }

        .delete-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #e74c3c;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 14px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .leave-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #f39c12;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 14px;
        }

        .leave-btn:hover {
            background: #d68910;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>팀 생성 완료</h2>

    <div class="success">팀이 성공적으로 생성되었습니다.</div>

    <div class="item">
        <span class="label">팀 이름</span>
        <div class="value" th:text="${teamName}"></div>
    </div>

    <div class="item">
        <span class="label">팀 리더 아이디</span>
        <div class="value" th:text="${leaderUsername}"></div>
    </div>

    <div class="item">
        <span class="label">팀원 아이디</span>
        <div class="value" th:text="${memberUsernames}"></div>
    </div>

    <div class="item">
        <span class="label">팀 소개</span>
        <div class="value" th:text="${description}"></div>
    </div>

    <a href="/teams/new" class="btn">다시 팀 만들기</a>

    <!-- 팀 삭제: 리더만 가능 -->
    <form th:action="@{/teams/{id}/delete(id=${teamId})}" method="post">
        <input type="hidden" name="loginUsername" th:value="${leaderUsername}">
        <button type="submit" class="delete-btn">팀 삭제</button>
    </form>

    <!-- 팀 탈퇴: 팀원 테스트용 -->
    <form th:action="@{/teams/{id}/leave(id=${teamId})}" method="post">
        <input type="text" name="loginUsername" placeholder="탈퇴할 팀원 아이디 입력 (예: member2)" required
               style="width:100%; margin-top:14px; padding:12px; border:1px solid #d9e2ec; border-radius:10px; box-sizing:border-box;">
        <button type="submit" class="leave-btn">팀 탈퇴</button>
    </form>
</div>
</body>
</html>
