<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>팀 관리</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f7;
            color: #222;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 56px 24px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .page-title {
            font-size: 40px;
            font-weight: 800;
            margin: 0;
        }

        .back-btn {
            text-decoration: none;
            background: #ececec;
            color: #444;
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: 700;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 26px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 26px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .card-title {
            margin: 0 0 20px 0;
            font-size: 30px;
            font-weight: 800;
        }

        .team-info {
            margin-bottom: 24px;
            line-height: 1.8;
            font-size: 16px;
        }

        .team-info strong {
            display: inline-block;
            min-width: 110px;
            color: #555;
        }

        .member-table-header {
            display: grid;
            grid-template-columns: 2fr 1fr;
            padding: 0 8px 12px 8px;
            color: #999;
            font-size: 14px;
            font-weight: 700;
            border-bottom: 1px solid #eee;
            margin-bottom: 8px;
        }

        .member-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            align-items: center;
            padding: 18px 8px;
            border-bottom: 1px solid #f1f1f1;
        }

        .member-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .member-badge {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #37c96b;
            color: white;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .member-meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .member-name {
            font-size: 20px;
            font-weight: 800;
        }

        .member-email {
            color: #888;
            font-size: 15px;
        }

        .role-tag {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            background: #e8f8ee;
            color: #37c96b;
            font-size: 13px;
            font-weight: 800;
        }

        .desc-box {
            background: #fafafa;
            border-radius: 18px;
            padding: 18px;
            line-height: 1.7;
            color: #555;
            margin-top: 18px;
        }

        .side-title {
            margin: 0 0 18px 0;
            font-size: 26px;
            font-weight: 800;
        }

        .action-form {
            margin-bottom: 14px;
        }

        .action-btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .delete-btn {
            background: #ff5b5b;
            color: white;
        }

        .leave-btn {
            background: #ececec;
            color: #333;
        }

        .info-box {
            background: #fafafa;
            border-radius: 18px;
            padding: 18px;
            line-height: 1.7;
            color: #666;
        }

        @media (max-width: 920px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="top-bar">
        <h1 class="page-title">🛡 팀 관리 # <span th:text="${teamId}">1</span></h1>
        <a th:href="@{/teams/new}" class="back-btn">← 새 팀 만들기</a>
    </div>

    <div class="layout">
        <div class="card">
            <h2 class="card-title">👥 참여 팀원</h2>

            <div class="team-info">
                <div><strong>팀 이름</strong> <span th:text="${teamName}">1team</span></div>
                <div><strong>팀장 이메일</strong> <span th:text="${leaderEmail}">leader@test.com</span></div>
            </div>

            <div class="member-table-header">
                <div>멤버 정보</div>
                <div>역할</div>
            </div>

            <div class="member-row">
                <div class="member-left">
                    <div class="member-badge">L</div>
                    <div class="member-meta">
                        <div class="member-name">팀장</div>
                        <div class="member-email" th:text="${leaderEmail}">leader@test.com</div>
                    </div>
                </div>
                <div>
                    <span class="role-tag">LEADER</span>
                </div>
            </div>

            <div class="member-row">
                <div class="member-left">
                    <div class="member-badge">M</div>
                    <div class="member-meta">
                        <div class="member-name">팀원 목록</div>
                        <div class="member-email" th:text="${memberEmails}">member@test.com, user@test.com</div>
                    </div>
                </div>
                <div>
                    <span class="role-tag" style="background:#f1f1f1; color:#888;">MEMBER</span>
                </div>
            </div>

            <div class="desc-box">
                <strong>팀 소개</strong><br>
                <span th:text="${description}">팀 소개 내용</span>
            </div>
        </div>

        <div>
            <div class="card" style="margin-bottom: 22px;">
                <h3 class="side-title">⚙ 팀 작업</h3>

                <form class="action-form" th:action="@{/teams/{teamId}/delete(teamId=${teamId})}" method="post">
                    <input type="hidden" name="loginEmail" th:value="${loginEmail}">
                    <button type="submit" class="action-btn delete-btn">팀 삭제</button>
                </form>

                <form class="action-form" th:action="@{/teams/{teamId}/leave(teamId=${teamId})}" method="post">
                    <input type="hidden" name="loginEmail" th:value="${loginEmail}">
                    <button type="submit" class="action-btn leave-btn">팀 탈퇴</button>
                </form>
            </div>

            <div class="card">
                <h3 class="side-title">안내</h3>
                <div class="info-box">
                    팀 삭제는 팀장만 가능해.<br>
                    팀장은 탈퇴할 수 없고 팀을 삭제해야 해.
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
