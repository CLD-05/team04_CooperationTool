<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>처리 완료</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f7;
        }

        .wrap {
            max-width: 700px;
            margin: 100px auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        h1 { margin-bottom: 20px; }
        p  { color: #666; margin-bottom: 28px; }

        a {
            display: inline-block;
            text-decoration: none;
            background: #37c96b;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>완료</h1>
    <p th:text="${message}">정상 처리되었습니다.</p>
    <a th:href="@{/teams/new}">팀 생성 페이지로 이동</a>
</div>
</body>
</html>
