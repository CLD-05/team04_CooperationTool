<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 생성 - Co-Work</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f9fafb; color: #333; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid #e5e7eb; }
        .logo { font-size: 20px; font-weight: bold; text-decoration: none; color: #333; }
        .btn-back { text-decoration: none; color: #6b7280; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .btn-back:hover { color: #111; }

        .container { max-width: 560px; margin: 60px auto; padding: 0 20px; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 40px; }
        .card-title { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; }
        .card-sub { font-size: 14px; color: #6b7280; margin: 0 0 32px 0; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input[type="text"], textarea {
            width: 100%; box-sizing: border-box;
            padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 14px; font-family: inherit; color: #111;
            outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus { border-color: #6366f1; }
        textarea { resize: vertical; min-height: 80px; }
        .hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }

        .error-box { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; color: #dc2626; }

        .btn-submit { width: 100%; padding: 13px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .btn-submit:hover { background: #4f46e5; }
    </style>
</head>
<body>

<header class="header">
    <a th:href="@{/dashboard}" class="logo">Co-Work</a>
    <a th:href="@{/dashboard}" class="btn-back">
        <i class="fas fa-arrow-left"></i> 대시보드로 돌아가기
    </a>
</header>

<div class="container">
    <div class="card">
        <h2 class="card-title">새 팀 만들기</h2>
        <p class="card-sub">팀을 생성하면 팀장으로 자동 등록됩니다.</p>

        <div th:if="${errorMessage}" class="error-box">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/teams/new}" method="post">
            <div class="form-group">
                <label for="name">팀 이름 <span style="color:#ef4444">*</span></label>
                <input type="text" id="name" name="name"
                       th:value="${teamForm?.name}"
                       placeholder="예) 마케팅팀, 개발 A팀" required>
            </div>

            <div class="form-group">
                <label for="description">팀 설명</label>
                <textarea id="description" name="description"
                          placeholder="팀의 목적이나 프로젝트를 간단히 설명해주세요."
                          th:text="${teamForm?.description}"></textarea>
            </div>

            <div class="form-group">
                <label for="memberEmails">초대할 팀원 이메일</label>
                <input type="text" id="memberEmails" name="memberEmails"
                       th:value="${teamForm?.memberEmails}"
                       placeholder="예) a@example.com, b@example.com">
                <p class="hint">여러 명은 쉼표(,)로 구분해서 입력하세요.</p>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-plus"></i> 팀 생성하기
            </button>
        </form>
    </div>
</div>

</body>
</html>
