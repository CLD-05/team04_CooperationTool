<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 협업 툴 - 대시보드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 기본 스타일 초기화 */
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f9fafb; color: #333; }
        
        /* 헤더 스타일 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid #e5e7eb; }
        .logo { font-size: 20px; font-weight: bold; }
        .user-menu { display: flex; gap: 20px; font-size: 14px; }
        .user-menu a { text-decoration: none; color: #4b5563; }
        
        /* 메인 컨테이너 */
        .container { padding: 40px; max-width: 1200px; margin: 0 auto; min-height: 83vh; display: flex; flex-direction: column;}
        .welcome-section { margin-bottom: 40px; }
        .main-title { font-size: 32px; font-weight: 800; margin: 0 0 10px 0; }
        .sub-title { font-size: 16px; color: #6b7280; margin: 0; }
        
        /* 팀 그리드 레이아웃 */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        
        /* 팀 카드 스타일 (핵심!) */
        .team-card { background: white; border: 1px solid #e5e7eb; padding: 25px; border-radius: 12px; transition: all 0.2s; position: relative; min-height: 200px; display: flex; flex-direction: column; }
        .team-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* 카드 내부 헤더 (아이콘 + 제목) */
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .team-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #6366f1; } /* 아이콘 색상 설정 */
        .team-name { font-size: 18px; font-weight: 700; margin: 0; }
        
        /* 카드 내용 */
        .team-desc { font-size: 14px; color: #6b7280; margin: 0 0 20px 0; line-height: 1.5; flex-grow: 1; }
        
        /* 프로젝트 열기 버튼 */
        .btn-open { width: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #374151; font-weight: 600; text-decoration: none; cursor: pointer; transition: background 0.2s; margin-top: auto; margin-bottom: 15px;}
        .btn-open:hover { background: #f3f4f6; border-color: #d1d5db; }
        
        /* 빈 목록 메시지 */
        .empty-message { text-align: center; color: #888; margin-top: 50px; }

        /* 페이지네이션 (디자인만) */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: auto; font-size: 14px; padding-top: 60px; padding-bottom: 10px;}
        .page-link { padding: 8px 12px; border: 1px solid #e5e7eb; background: white; color: #374151; text-decoration: none; border-radius: 6px; }
        .page-link:hover:not(.active) { background: #f9fafb; }
        .page-link.active { background: #6366f1; color: white; border-color: #6366f1; }
        .page-text { color: #6b7280; margin: 0 10px; cursor: pointer; }
        
        
       .btn-create { background-color: #007bff; color: #fff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; transition: background 0.2s; display: inline-flex; align-items: center; gap: 6px; }
	   .btn-create:hover { background-color: #0056b3; }

		/* 모바일 등 화면이 좁아질 때를 대비한 설정 */
		@media (max-width: 600px) {
		    .sub-title { flex-direction: column; align-items: flex-start !important; gap: 10px; }
		}
       
        
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Co-Work</div>
        <nav class="user-menu">
		<nav class="user-menu">
		    <form th:action="@{/api/user/logout}" method="post" 
		          onclick="this.submit();" 
		          style="display: inline; cursor: pointer; color: inherit;">
		        <i class="fas fa-sign-out-alt"></i> 로그아웃
		    </form>
		</nav>
		<!--  <form th:href="@{/api/teams/{team_id}}"><i class="fas fa-running"></i> 팀 탈퇴</form> -->
        </nav>
    </header>

    <main class="container">
        <section class="welcome-section">
            <h1 class="main-title">내 팀 프로젝트</h1>
            <p class="sub-title" style="display: flex; justify-content: space-between; align-items: center;">
		        <span>
		            <span th:text="${dashboard.userName}" style="font-weight: 600; color: #333;">홍길동</span>, 참여 중인 팀 프로젝트 목록입니다.
		        </span>
		
<!-- 				<a th:href="@{/team/create}" class="btn-create">
		            <i class="fas fa-plus"></i> 새 프로젝트 생성
		        </a> -->
		    </p>
		</section>

        <div th:if="${#lists.isEmpty(dashboard.teams)}" class="empty-message">
            <p>아직 소속된 팀이 없습니다. 새로운 팀을 만들어보세요!</p>
            
            <a th:href="@{/team/create}" class="btn-create-new">
	        <i class="fas fa-plus-circle"></i> 새 프로젝트 생성 </a>
        </div>

        <div th:unless="${#lists.isEmpty(dashboard.teams)}" class="team-grid">
            <div th:each="team : ${dashboard.teams}" class="team-card">
                
                <div class="card-header">
                    <div class="team-icon">
                        <i class="fas fa-users-viewfinder"></i> </div>
                    <h4 class="team-name" th:text="${team.name}"> ???팀 </h4>
                </div>

				<p class="team-desc" th:text="${team.description ?: '프로젝트 설명을 설정하세요.'}">
				    설명 자리
				</p>
   					
                
                <a th:href="@{/teams/{teamId}/files(teamId=${team.id})}" class="btn-open">
                    <i class="far fa-calendar-alt"></i> 프로젝트 열기
                </a>
            </div>
        </div>
        
		<div th:if="${dashboard.totalPages > 0}" class="pagination">
		    
		    <a th:href="@{/dashboard(page=${currentPage - 1})}" 
		       th:if="${currentPage > 0}" class="page-text">
		       <i class="fas fa-angle-left"></i> Previous
		    </a>
		
		    <th:block th:each="i : ${#numbers.sequence(0, dashboard.totalPages - 1)}">
		        <a th:href="@{/dashboard(page=${i})}" 
		           th:text="${i + 1}" 
		           th:classappend="${i == currentPage} ? 'active'" 
		           class="page-link">1</a>
		    </th:block>
		
		    <a th:href="@{/dashboard(page=${currentPage + 1})}" 
		       th:if="${currentPage < dashboard.totalPages - 1}" class="page-text">
		       Next <i class="fas fa-angle-right"></i>
		    </a>
		</div>

 
    </main>

</body>
</html>
