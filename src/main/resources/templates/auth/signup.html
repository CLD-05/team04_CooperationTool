<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Cooperation Tool</title>
    <!--  style.css 연결 -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    
    <div class="auth-container signup-box">
        <h2>회원가입</h2>

        <!-- 중복 이메일 등 에러 발생 시 나타나는 빨간색 알림창 -->
        <div th:if="${error}" class="alert alert-danger">
            <strong th:text="${error}"></strong>
        </div>

        <form th:action="@{/api/user/signup}" method="post">
            <div class="form-group">
                <!-- 필수 항목임을 나타내는 .required 클래스 적용 -->
                <label class="required">이메일</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label class="required">비밀번호</label>
                <input type="password" name="password" required minlength="8" placeholder="8자 이상 입력하세요">
            </div>
            <div class="form-group">
   				 <label class="required">비밀번호 확인</label>
  				  <input type="password" name="confirmPassword" required 
           placeholder="비밀번호를 한 번 더 입력하세요">
			</div>
            <div class="form-group">
                <label class="required">닉네임</label>
                <input type="text" name="nickname" required placeholder="사용할 닉네임을 입력하세요">
            </div>
            <button type="submit" class="btn-submit">가입하기</button>
        </form>

        <div class="auth-footer">
            <p>이미 계정이 있나요? <a th:href="@{/api/user/login}">로그인 페이지로</a></p>
        </div>
    </div>
</body>
</html>
