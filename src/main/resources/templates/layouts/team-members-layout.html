<!DOCTYPE html>
<html th:fragment="layout(content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Co-Work Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --primary: #2ecc71; --danger: #ff4d4f; --bg: #f8f9fa; --card: #ffffff; --text: #333; --border: #f0f0f0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 26px; margin: 0; font-weight: 700; }
        .btn-back { text-decoration: none; color: #666; font-size: 13px; padding: 8px 16px; border-radius: 8px; background: #eee; }
        .dashboard-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 24px; }
        .card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); }
        .card h2 { font-size: 18px; margin: 0 0 20px 0; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 12px; color: #aaa; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 16px 0; border-bottom: 1px solid #fcfcfc; vertical-align: middle; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 38px; height: 38px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .role-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .role-leader { background: #e8f5e9; color: var(--primary); }
        .role-member { background: #f4f4f4; color: #888; }
        .btn-action { border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-remove { background: #fff1f0; color: var(--danger); }
        .btn-invite { background: var(--primary); color: white; width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .waiting-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f9f9f9; }
        .waiting-status { color: #f39c12; font-size: 11px; font-weight: bold; background: #fff9eb; padding: 3px 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div th:replace="${content}"></div>
</body>
</html>
