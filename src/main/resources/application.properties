spring.application.name=filetest

# ==========================================
# 1. Server & Encoding (서버 기본 설정)
# ==========================================
# 내장 톰캣 서버 포트
server.port=8080
# 파라미터 한글 깨짐 방지
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ==========================================
# 2. Database (MySQL 연결 설정)
# ==========================================
# [협업 주의] url의 'team_project_db'는 실제 생성한 데이터베이스 이름과 같아야 합니다.
spring.datasource.url=jdbc:mysql://localhost:3306/team_project_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
# [각자 수정 필요] 본인 컴퓨터의 MySQL 아이디와 비밀번호로 변경하세요.
spring.datasource.username=scott
spring.datasource.password=tiger
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. JPA / Hibernate (ORM 설정)
# ==========================================
# 실행되는 SQL 쿼리를 콘솔에 예쁘게 출력
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 쿼리에 들어가는 파라미터 값(?)을 로그로 확인하기 위한 설정
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# 테이블 자동 생성 설정 
# update: DB 테이블이 없으면 만들고, 있으면 변경된 컬럼만 추가함 (개발 단계 추천)
spring.jpa.hibernate.ddl-auto=none

# ==========================================
# 4. File Upload (작성자님 담당 파트 설정)
# ==========================================
# 파일 1개당 최대 허용 용량 (10MB)
spring.servlet.multipart.max-file-size=10MB
# 한 번의 폼 전송에 허용되는 최대 용량 (10MB)
spring.servlet.multipart.max-request-size=10MB

# [각자 수정 필요] 실제 파일이 저장될 물리적 경로 (맥북 기준)
# 반드시 본인 맥북 사용자 이름으로 바꾸고, 마지막에 슬래시(/)를 넣어야 합니다.
# (도커 도입 전, 로컬 개발 환경용)
file.dir=/Users/mingyu/Desktop/CE/

# ==========================================
# 5. Thymeleaf (화면 렌더링 설정)
# ==========================================
# HTML 파일을 수정했을 때 서버 재시작 없이 새로고침만으로 적용되게 하는 설정
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html