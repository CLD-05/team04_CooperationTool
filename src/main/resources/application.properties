spring.application.name=cowork
server.port=8080
file.dir=file.dir=C:/upload/

# MySQL 연결 (로컬 MySQL 있는 경우)
spring.datasource.url=jdbc:mysql://localhost:3306/coop_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
