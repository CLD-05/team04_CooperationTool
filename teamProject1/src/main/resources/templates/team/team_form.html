<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>팀 생성</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 420px;
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 28px;
            color: #243b53;
        }

        label {
            display: block;
            margin: 14px 0 8px;
            font-weight: bold;
            color: #334e68;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid #d9e2ec;
            border-radius: 10px;
            font-size: 15px;
        }

        textarea {
            min-height: 100px;
            resize: none;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: #3b97d3;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #2f86bf;
        }

        .error {
            color: red;
            margin-top: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>팀 생성</h2>

    <form th:action="@{/teams/new}" th:object="${teamForm}" method="post">
        <label>팀 이름</label>
        <input type="text" th:field="*{name}" required>

        <label>팀 리더 아이디</label>
        <input type="text" th:field="*{leaderUsername}" placeholder="예: member1" required>

        <label>팀원 아이디 (쉼표로 구분)</label>
        <input type="text" th:field="*{memberUsernames}" placeholder="예: member2,member3,member4">

        <label>팀 소개</label>
        <textarea th:field="*{description}"></textarea>

        <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <button type="submit">팀 생성 완료</button>
    </form>
</div>
</body>
</html>
